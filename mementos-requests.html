<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P5 To Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/mementos-requests.css" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/Pictures/black-p5-star-192.png" />
    <link rel="apple-touch-icon" href="assets/Pictures/black-p5-star-192.png" />
  </head>
  <body>
    <!-- Background Stars -->
    <iframe
      src="assets/p5-background.html"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        border: none;
        z-index: -1;
        pointer-events: none;
      "
    ></iframe>
    <script src="js/navbar.js"></script>
    <div class="page-wrapper">
      <h1>Persona 5:</h1>
      <h2>The To-Do List</h2>
      <div id="daily-categories"></div>
      <div class="controls">
        <button id="add-task-btn">Add Task</button>
        <button id="edit-btn">Edit List</button>
        <button id="export-data-btn">Export Data</button>
        <button id="import-data-btn">Import Data</button>
        <input type="file" id="import-file" accept="application/json" style="display: none" />
      </div>
    </div>

    <div id="task-overlay">
      <input type="text" id="task-category" placeholder="Category" />
      <input type="text" id="task-desc" placeholder="Task Description" />
      <label for="task-month" class="month-label">Date (Optional):</label>
      <div class="date-time-row">
        <input type="text" id="task-month" placeholder="MM" />
        <label for="task-day" class="day-label">/</label>
        <input type="text" id="task-day" placeholder="DD" />
        <label for="task-hour" class="hour-label"> at </label>
        <input type="text" id="task-hour" placeholder="HH" />
        <label for="task-min" class="min-label">:</label>
        <input type="text" id="task-min" placeholder="MM" />
        <select id="task-ampm">
          <option value=""></option>
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
      </div>
      <div class="reminder-config">
        <label class="reminder-enable-row">
          <input type="checkbox" id="task-reminder-enabled" checked />
          Enable due date notifications
        </label>
        <div class="reminder-grid">
          <label for="task-reminder-before">Send before (minutes)</label>
          <input type="number" id="task-reminder-before" min="0" step="1" value="60" />
          <label for="task-reminder-repeat">Repeat every (minutes)</label>
          <input type="number" id="task-reminder-repeat" min="0" step="1" value="0" />
          <label for="task-reminder-count">Repeat count</label>
          <input type="number" id="task-reminder-count" min="0" step="1" value="0" />
        </div>
      </div>
      <div style="display: flex; justify-content: center; gap: 1rem">
        <button id="submit-task-btn">Add Task</button>
        <button id="cancel-task-btn">Cancel</button>
      </div>
    </div>

    <script src="js/reminders.js"></script>
    <script src="js/mementos-requests.js"></script>
  </body>
</html>
