<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../js/navbar.js"></script>
    <link rel="stylesheet" href="/css/navbar-P1.css">
    <link rel="stylesheet" href="/css/P1-Contact.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelations: Persona (PSP Edition) Demon Contact Guide</title>
</head>
<body style="background-color: #b07fff;">
    <body class="p1-contact">
        <!-- Navbar will be injected by navbar.js -->
        <h1>Persona, Persona, Come to me!</h1>
        <div>
            <input type="text" id="searchbar" placeholder="Search demon..." />
            <button id="searchBtn">Search</button>
        </div>
        <div class="character-filter">
            <label><input type="checkbox" class="char-checkbox" value="MC">MC</label>
            <label><input type="checkbox" class="char-checkbox" value="Maki">Maki</label>
            <label><input type="checkbox" class="char-checkbox" value="Mark">Mark</label>
            <label><input type="checkbox" class="char-checkbox" value="Nanjo">Nanjo</label>
            <label><input type="checkbox" class="char-checkbox" value="Yukino">Yukino</label>
            <label><input type="checkbox" class="char-checkbox" value="Elly">Elly</label>
            <label><input type="checkbox" class="char-checkbox" value="Reiji">Reiji</label>
            <label><input type="checkbox" class="char-checkbox" value="Ayase">Ayase</label>
        </div>
        <div class="demon-list" id="demonList"></div>
        <script src="/js/Persona-1-data.js"></script>
        <script src="/js/P1-Contact.js"></script>
</body>
</html>
