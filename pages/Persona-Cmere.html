<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revelations: Persona Walkthrough</title>
  <script src="../js/navbar.js"></script>
  <script src="../js/load-from-dropbox.js"></script>
  <link rel="stylesheet" href="/css/navbar-P1.css">
  <link rel="stylesheet" href="P1-Guide.css">
</head>
<body>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <h2>Table of Contents</h2>
      <div id="tocList"></div>
    </aside>

    <main class="main-content">

      <div class="progress-wrapper">
        <div class="progress-section">
          <div class="progress-label">
            Overall Progress
            <span id="overallPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div id="overallBar" class="progress-fill"></div>
          </div>
        </div>

        <div class="progress-section">
          <div class="progress-label">
            Chapter 4 Progress
            <span id="chapter4Percent">0%</span>
          </div>
          <div class="progress-bar">
            <div id="chapter4Bar" class="progress-fill"></div>
          </div>
        </div>

        <div class="progress-section">
          <div class="progress-label">
            Chapter 5 Progress
            <span id="chapter5Percent">0%</span>
          </div>
          <div class="progress-bar">
            <div id="chapter5Bar" class="progress-fill"></div>
          </div>
        </div>
      </div>

      <div class="book-container">
        <article class="book-page" id="bookPage">
          <div id="pageTitle">Loading guide...</div>
          <div id="pageContent"></div>
        </article>
      </div>

      <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="bookmarkBtn">Bookmark</button>
        <button id="goBookmarkBtn">Go To Bookmark</button>
        <span id="pageIndicator">0 / 0</span>
        <button id="nextBtn">Next</button>
      </div>

    </main>
  </div>

  <script src="P1-Guide.js"></script>
</body>
</html>
