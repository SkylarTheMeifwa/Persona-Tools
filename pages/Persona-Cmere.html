<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revelations: Persona Walkthrough</title>
  <script src="/js/navbar.js"></script>
  <link rel="stylesheet" href="/css/navbar-P1.css">
  <link rel="stylesheet" href="/css/P1-Guide.css">
</head>
<body>

  <button class="sidebar-toggle" id="sidebarToggle">☰ TOC</button>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <h2>Table of Contents</h2>
      <div id="tocList"></div>
    </aside>

    <main class="main-content">

      <div class="progress-wrapper">
        <div class="progress-section">
          <div class="progress-label">
            Overall Progress
            <span id="overallPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div id="overallBar" class="progress-fill"></div>
          </div>
        </div>

        <div class="progress-section">
          <div class="progress-label">
            <span id="currentChapterLabel">Chapter Progress</span>
            <span id="currentChapterPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div id="currentChapterBar" class="progress-fill"></div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="prevBtn">Previous</button>
        <span class="pageIndicator">0 / 0</span>
        <button class="nextBtn">Next</button>
      </div>

      <div class="book-container">
        <article class="book-page" id="bookPage">
          <div id="pageTitle">Loading guide...</div>
          <div id="pageContent"></div>
        </article>
      </div>

      <div class="controls">
        <button class="prevBtn">Previous</button>
        <span class="pageIndicator">0 / 0</span>
        <button class="nextBtn">Next</button>
      </div>

    </main>
  </div>

  <script src="/js/P1-Guide.js"></script>
</body>
</html>
