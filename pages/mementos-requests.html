<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P5 To Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/mementos-requests.css" />
    <link rel="manifest" href="../config/manifest.json" />
    <link rel="icon" type="image/png" href="../assets/Pictures/black-p5-star.png" />
    <link rel="apple-touch-icon" href="../assets/Pictures/ren-shiny-192.png" />
  </head>
  <body>
    <!-- Background Stars -->
    <iframe
      src="../assets/p5-background.html"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        border: none;
        z-index: -1;
        pointer-events: none;
      "
    ></iframe>
    <script src="../js/navbar.js"></script>
    <div class="page-wrapper">
      <h1>Persona 5:</h1>
      <h2>The To-Do List</h2>
      <div class="controls">
        <button id="add-task-btn">Add Task</button>
        <button id="edit-btn">Edit List</button>
        <button id="export-data-btn">Export Data</button>
        <button id="import-data-btn">Import Data</button>
        <input type="file" id="import-file" accept="application/json" style="display: none" />
      </div>
      <div id="daily-categories"></div>
    </div>

    <div id="task-overlay">
      <div class="category-input-group">
        <label for="task-category-select">Category</label>
        <select id="task-category-select"></select>
        <input type="text" id="task-category-new" placeholder="New Category" style="display: none" />
      </div>
      <input type="text" id="task-desc" placeholder="Task Description" />
      <div class="subtask-config">
        <div class="subtask-header-row">
          <label>Subtasks</label>
          <button id="add-subtask-btn" type="button">Add Subtask</button>
        </div>
        <div id="task-subtasks-list"></div>
      </div>
      <label for="task-date" class="month-label">Date (Optional):</label>
      <div class="date-time-row">
        <input type="date" id="task-date" />
        <label for="task-hour" class="hour-label"> at </label>
        <input type="text" id="task-hour" placeholder="HH" />
        <label for="task-min" class="min-label">:</label>
        <input type="text" id="task-min" placeholder="MM" />
        <select id="task-ampm">
          <option value=""></option>
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
      </div>
      <div class="notification-config">
        <div class="notification-header-row">
          <label>Task Notifications</label>
          <button id="add-notification-btn" type="button">Add Notification</button>
        </div>
        <div id="task-notifications-list"></div>
      </div>
      <div class="task-overlay-actions">
        <button id="submit-task-btn">Add Task</button>
        <button id="cancel-task-btn">Cancel</button>
      </div>
    </div>

    <script src="../js/reminders.js"></script>
    <script src="../js/mementos-requests.js"></script>
  </body>
</html>
