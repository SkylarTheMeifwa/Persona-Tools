<!DOCTYPE html>
<html>
    <head>
        <title>Gas Price Calculator</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../css/GasCalculator.css" />
        <link rel="manifest" href="../config/manifest.json" />
        <link rel="icon" type="image/png" href="../assets/Pictures/black-p5-star.png" />
        <link rel="apple-touch-icon" href="../assets/Pictures/ren-shiny-192.png" />
    </head>
    <body>
        <iframe
            src="../assets/p5-background.html"
            style="
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                border: none;
                z-index: -1;
                pointer-events: none;
            "
            aria-hidden="true"
        ></iframe>
        <script src="../js/navbar.js"></script>
        <main class="gas-page">
            <div class="gas-card" style="margin-bottom: 1.5em;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem;">
                    <div style="flex: 1 1 420px;">
                        <h1 style="margin: 0; font-family: 'Barlow Condensed', sans-serif; font-size: clamp(2rem, 4vw, 3rem); letter-spacing: 1px; text-transform: uppercase;">Gas Price Calculator</h1>
                        <p>Estimate how many gallons you can get for a specific amount with cashback.</p>
                    </div>
                    <div style="display: flex; align-items: flex-start; justify-content: flex-end; flex: 0 1 auto;">
                        <button id="reset-gas" type="reset" class="secondary-action" form="gas-form">Reset</button>
                    </div>
                </div>
            </div>
            <section class="gas-calc-section">
                <div class="gas-card">
                    <form id="gas-form" class="gas-form">
                        <div class="summary-grid gas-input-grid">
                            <div class="summary-stat">
                                <label class="summary-label">Price at Pump:
                                    <input type="number" step="0.001" min="0" id="pricePump" required class="summary-value" />
                                </label>
                            </div>
                            <div class="summary-stat">
                                <label class="summary-label">Station Rewards:
                                    <input type="number" step="0.01" min="0" id="stationRewards" class="summary-value" />
                                </label>
                            </div>
                            <div class="summary-stat">
                                <label class="summary-label">Uber Cashback:
                                    <input type="number" step="0.01" min="0" max="100" id="uberCashback" required class="summary-value" />
                                </label>
                            </div>
                            <div class="summary-stat">
                                <label class="summary-label">Upside Cashback:
                                    <input type="number" step="0.01" min="0" id="upsideCashback" class="summary-value" />
                                </label>
                            </div>
                            <div class="summary-stat">
                                <label class="summary-label">Desired Total:
                                    <input type="number" step="0.01" min="0" id="targetTotal" required class="summary-value" />
                                </label>
                            </div>
                            <div style="display:flex;align-items:end;justify-content:end;">
                                <button type="submit" class="summary-value" style="width:100%;">Calculate</button>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="gas-card" id="gas-summary-card" style="display:none;">
                    <section class="gas-summary" id="gas-summary" aria-live="polite">
                        <div class="section-heading">
                        </div>
                        <div class="summary-grid" id="gas-summary-grid"></div>
                    </section>
                </div>
                <div class="gas-card" id="actuals-card" style="display:none;">
                    <section class="gas-actual-section" id="gas-actual-section">
                        <form id="gas-actual-form" class="gas-form">
                            <div class="summary-grid gas-input-grid">
                                <div class="summary-stat">
                                    <label class="summary-label">Amount Paid:
                                        <input type="number" step="0.01" min="0" id="actualPaid" required class="summary-value" />
                                    </label>
                                </div>
                                <div class="summary-stat">
                                    <label class="summary-label">Gallons Bought:
                                        <input type="number" step="0.001" min="0" id="actualGallons" required class="summary-value" />
                                    </label>
                                </div>
                                <div style="display:flex;align-items:end;justify-content:end;">
                                    <button type="submit" class="summary-value" style="width:100%;">Calculate Final Price</button>
                                </div>
                            </div>
                        </form>
                    </section>
                </div>
                <div class="gas-card" id="actuals-results-card" style="display:none;">
                    <section>
                        <div id="actual-results-content"></div>
                    </section>
                </div>
            </section>
        </main>
        <script src="../js/GasCalculator.js"></script>
    </body>
</html>
